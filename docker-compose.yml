version: '3.8'

services:
  # --- INGRESS LOGIC GATEWAY ---
  api-router:
    build: .
    command: node dist/routerServer.js
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - ledger-mesh

  # --- KAFKA BACKGROUND ROUTING WORKER ---
  ledger-worker:
    build: .
    command: node dist/ledgerWorker.js
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
      - shard-eastus
      - shard-westus
      - shard-northeurope
    networks:
      - ledger-mesh

  # --- STATEFUL SHARD REPLICAS ---
  shard-eastus:
    build: .
    command: node dist/storageServer.js
    environment:
      - PORT=5001
      - NODE_NAME=shard-eastus
      - STORAGE_DIR=/app/storage/eastus
    volumes:
      - ./docker_disks/eastus:/app/storage/eastus
    networks:
      - ledger-mesh

  shard-westus:
    build: .
    command: node dist/storageServer.js
    environment:
      - PORT=5001
      - NODE_NAME=shard-westus
      - STORAGE_DIR=/app/storage/westus
    volumes:
      - ./docker_disks/westus:/app/storage/westus
    networks:
      - ledger-mesh

  shard-northeurope:
    build: .
    command: node dist/storageServer.js
    environment:
      - PORT=5001
      - NODE_NAME=shard-northeurope
      - STORAGE_DIR=/app/storage/northeurope
    volumes:
      - ./docker_disks/northeurope:/app/storage/northeurope
    networks:
      - ledger-mesh

  # --- OFFICIAL APACHE KAFKA KRaft BROKER ---
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
    networks:
      - ledger-mesh

networks:
  ledger-mesh:
    driver: bridge